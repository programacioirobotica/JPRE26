<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <title>JPRE Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">JPRE Connect</p>
          <h1>Espai personal de jornada</h1>
        </div>
        <button id="logout-button" class="ghost-button is-hidden" type="button">Sortir</button>
      </header>

      <main id="app-root" class="app-root"></main>
    </div>

    <template id="login-template">
      <section class="hero-card">
        <p class="hero-card__tag">Nova web app independent</p>
        <h2>Accedeix a la teva jornada des del mòbil</h2>
        <p class="hero-card__text">
          Aquest prototip està separat del formulari actual i serveix com a base per a login,
          informació personalitzada i comunicació amb organització.
        </p>
      </section>

      <section class="panel">
        <div class="panel__header">
          <h2>Entrar</h2>
          <p>Versió de prova per definir fluxos i pantalles.</p>
        </div>

        <form id="login-form" class="stack-form">
          <div class="login-block">
            <p class="login-block__label">Accés recomanat</p>
            <div id="google-login-slot" class="google-login-slot"></div>
            <p id="google-login-help" class="login-help">
              Inicia sessió amb el mateix compte de Google que vas fer servir a la inscripció.
            </p>
          </div>

          <div class="login-divider">
            <span>o bé entra amb el correu</span>
          </div>

          <label class="field">
            <span>Correu</span>
            <input name="email" type="email" placeholder="nom@centre.cat" required />
          </label>

          <button class="primary-button" type="submit">Entrar a l'espai</button>
          <p id="login-status" class="login-status" role="status"></p>
        </form>
      </section>
    </template>

    <template id="dashboard-template">
      <section class="profile-card">
        <div>
          <p class="eyebrow" id="role-label"></p>
          <h2 id="user-name"></h2>
          <p id="user-email" class="muted"></p>
        </div>
        <div class="status-pill" id="workshop-status"></div>
      </section>

      <section class="panel panel--overview">
        <div class="panel__header">
          <h2 id="overview-title"></h2>
          <p id="overview-text"></p>
        </div>
        <div id="summary-grid" class="summary-grid"></div>
      </section>

      <nav class="section-tabs" aria-label="Seccions">
        <button class="section-tab is-active" data-tab="home" type="button">Inici</button>
        <button class="section-tab" data-tab="agenda" type="button">Agenda</button>
        <button class="section-tab" data-tab="taller" type="button">Taller</button>
        <button class="section-tab" data-tab="messages" type="button">Missatges</button>
        <button class="section-tab" data-tab="people" type="button">Gent</button>
      </nav>

      <section class="tab-panel" data-panel="home">
        <div class="panel">
          <div class="panel__header">
            <h2>Vista ràpida</h2>
            <p>Resum immediat del que necessites consultar en obrir l'app.</p>
          </div>
          <div id="announcement-list" class="card-list"></div>
        </div>
      </section>

      <section class="tab-panel is-hidden" data-panel="agenda">
        <div class="panel">
          <div class="panel__header">
            <h2>El teu dia</h2>
            <p>Vista resumida pensada per consultar ràpidament des del telèfon.</p>
          </div>
          <div class="timeline" id="timeline-list"></div>
        </div>
      </section>

      <section class="tab-panel is-hidden" data-panel="taller">
        <div class="panel">
          <div class="panel__header">
            <h2>Informació del taller</h2>
            <p id="workshop-panel-copy"></p>
          </div>
          <div id="workshop-detail"></div>
        </div>
      </section>

      <section class="tab-panel is-hidden" data-panel="messages">
        <div class="panel">
          <div class="panel__header">
            <h2>Comunicació</h2>
            <p>
              Primer enfocament recomanat: conversa entre organització i participants, sense xat lliure.
            </p>
          </div>
          <div id="message-thread" class="thread"></div>
          <form id="message-form" class="composer">
            <textarea
              name="message"
              rows="3"
              placeholder="Escriu un missatge de prova..."
            ></textarea>
            <button class="primary-button" type="submit">Enviar</button>
          </form>
        </div>
      </section>

      <section class="tab-panel is-hidden" data-panel="people">
        <div class="panel">
          <div class="panel__header">
            <h2>Directori i seguiment</h2>
            <p>Vista reservada per organització per supervisar participants, ponents i equip.</p>
          </div>
          <div id="people-list" class="card-list"></div>
        </div>
      </section>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
