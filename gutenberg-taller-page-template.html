<!-- Plantilla Gutenberg: Página informativa de un taller -->
<!--
  Uso:
  1) Inserta este HTML en un bloque "HTML personalizado".
  2) Cambia data-num con el número de la fila/taller (columna A: Num).
  3) Carga el JS "gutenberg-taller-page-template.js" en esa página.
-->
<section
  id="jpre-taller-page"
  class="jpre-taller-page"
  data-webapp-url="https://script.google.com/macros/s/AKfycbwnlk1OhghSo_PCC5xXZnqKqc7TVUZFJrexK-PxSCxp0ODWSA0ebfV0XKThSxDFFi7h/exec"
  data-num="1"
  data-taller-id=""
  data-taller-nom=""
  data-franja=""
>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap');

    #jpre-taller-page,
    #jpre-taller-page * {
      box-sizing: border-box;
    }

    #jpre-taller-page {
      --teal: #6a9fb3;
      --teal-dark: #2f5562;
      --coral: #d56b4c;
      --rose: #efd6d4;
      --ink: #1f2b32;
      --sky: #b5dceb;
      --cream: #f7f1ef;
      --card: #ffffff;
      --success: #2e9b53;
      --warning: #d0882f;
      --danger: #c23b2a;

      font-family: "Sora", "Segoe UI", "Calibri", "Arial", sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, var(--sky), var(--rose));
      border-radius: 22px;
      padding: 18px;
    }

    #jpre-taller-page .jpre-shell {
      max-width: 980px;
      margin: 0 auto;
    }

    #jpre-taller-page .jpre-hero {
      border-radius: 24px;
      padding: 20px 22px;
      background:
        radial-gradient(120% 140% at 0% 0%, rgba(181, 220, 235, 0.45), transparent 55%),
        radial-gradient(120% 140% at 100% 100%, rgba(239, 214, 212, 0.55), transparent 58%),
        linear-gradient(135deg, #ffffff, #fcf8f6);
      box-shadow: 0 22px 50px rgba(31, 43, 50, 0.18);
      display: grid;
      gap: 10px;
    }

    #jpre-taller-page .jpre-kicker {
      margin: 0;
      font-size: 0.86rem;
      font-weight: 700;
      color: var(--coral);
      letter-spacing: 1.8px;
      text-transform: uppercase;
    }

    #jpre-taller-page .jpre-title {
      margin: 0;
      font-size: clamp(1.7rem, 2.2vw + 1rem, 2.7rem);
      line-height: 1.08;
      font-weight: 700;
      color: var(--teal-dark);
      background: linear-gradient(110deg, var(--teal-dark), var(--teal), var(--coral));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-wrap: balance;
    }

    #jpre-taller-page .jpre-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    #jpre-taller-page .jpre-chip {
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.84rem;
      font-weight: 700;
      background: #fff;
      border: 1px solid rgba(47, 85, 98, 0.18);
      color: var(--teal-dark);
    }

    #jpre-taller-page .jpre-main {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
    }

    #jpre-taller-page .jpre-box {
      background: var(--card);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 14px 30px rgba(31, 43, 50, 0.1);
    }

    #jpre-taller-page .jpre-box h3 {
      margin: 0 0 8px;
      color: var(--coral);
      font-size: 1.06rem;
      line-height: 1.25;
    }

    #jpre-taller-page .jpre-text {
      margin: 0;
      line-height: 1.65;
      white-space: pre-line;
    }

    #jpre-taller-page .jpre-info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    #jpre-taller-page .jpre-photos {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(88px, 110px));
      gap: 8px;
    }

    #jpre-taller-page .jpre-photo {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid transparent;
      background:
        linear-gradient(var(--card), var(--card)) padding-box,
        conic-gradient(
          from 120deg,
          var(--teal),
          var(--coral),
          var(--sky),
          var(--rose),
          var(--teal-dark),
          var(--teal)
        ) border-box;
      box-shadow:
        0 10px 24px rgba(47, 85, 98, 0.24),
        0 0 0 6px rgba(181, 220, 235, 0.28);
    }

    #jpre-taller-page .jpre-device-wrap {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    #jpre-taller-page .jpre-device-img {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--teal-dark);
      background: #f2f5f8;
      box-shadow: 0 4px 10px rgba(47, 85, 98, 0.14);
    }

    #jpre-taller-page .jpre-progress {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #jpre-taller-page .jpre-progress-track {
      width: 100%;
      height: 9px;
      border-radius: 999px;
      background: #e5edf1;
      overflow: hidden;
    }

    #jpre-taller-page .jpre-progress-bar {
      height: 100%;
      width: 0;
      transition: width 0.25s ease;
      background: var(--success);
    }

    #jpre-taller-page .jpre-progress-bar.mid { background: var(--warning); }
    #jpre-taller-page .jpre-progress-bar.low { background: var(--danger); }
    #jpre-taller-page .jpre-progress-label {
      align-self: end;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--success);
    }
    #jpre-taller-page .jpre-progress-label.mid { color: var(--warning); }
    #jpre-taller-page .jpre-progress-label.low { color: var(--danger); }

    #jpre-taller-page .jpre-loading,
    #jpre-taller-page .jpre-error {
      margin: 0;
      font-weight: 600;
    }

    #jpre-taller-page .is-hidden {
      display: none !important;
    }

    @media (max-width: 860px) {
      #jpre-taller-page .jpre-main {
        grid-template-columns: 1fr;
      }
      #jpre-taller-page .jpre-info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <div class="jpre-shell">
    <article class="jpre-hero">
      <p class="jpre-kicker">Fitxa de Taller</p>
      <h1 class="jpre-title" id="jpre-title">Carregant...</h1>
      <div class="jpre-meta">
        <span class="jpre-chip" id="jpre-chip-franja">Franja: -</span>
        <span class="jpre-chip" id="jpre-chip-etapa">Etapa: -</span>
        <span class="jpre-chip" id="jpre-chip-aula">Aula: -</span>
      </div>
      <p class="jpre-loading" id="jpre-loading">Carregant informació del taller...</p>
      <p class="jpre-error is-hidden" id="jpre-error">No s'ha trobat el taller.</p>
    </article>

    <section class="jpre-main is-hidden" id="jpre-main">
      <div class="jpre-box">
        <h3>Descripció del taller</h3>
        <p class="jpre-text" id="jpre-descripcio"></p>
      </div>

      <div class="jpre-box">
        <h3>Places disponibles</h3>
        <p class="jpre-text" id="jpre-places"></p>
        <div class="jpre-progress">
          <div class="jpre-progress-track">
            <div class="jpre-progress-bar" id="jpre-progress-bar"></div>
          </div>
          <div class="jpre-progress-label" id="jpre-progress-label">0%</div>
        </div>
      </div>

      <div class="jpre-box">
        <h3>Imparteix</h3>
        <p class="jpre-text" id="jpre-imparteix"></p>
        <div class="jpre-photos" id="jpre-photos">
          <img class="jpre-photo is-hidden" id="jpre-foto-1" alt="Foto ponent 1" />
          <img class="jpre-photo is-hidden" id="jpre-foto-2" alt="Foto ponent 2" />
        </div>
      </div>

      <div class="jpre-box">
        <h3>Dispositiu / tecnologia</h3>
        <div class="jpre-device-wrap">
          <p class="jpre-text" id="jpre-dispositiu"></p>
          <img class="jpre-device-img is-hidden" id="jpre-device-img" alt="Dispositiu" />
        </div>
      </div>

      <div class="jpre-box">
        <h3>Material necessari</h3>
        <p class="jpre-text" id="jpre-material"></p>
      </div>
    </section>
  </div>
</section>
