<!-- JPRE Gutenberg Template -->
<div id="jpre-gutenberg-root" class="jpre-wrap">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap');

    .jpre-wrap,
    .jpre-wrap * {
      box-sizing: border-box;
    }

    .jpre-wrap {
      --teal: #6a9fb3;
      --teal-dark: #2f5562;
      --coral: #d56b4c;
      --rose: #efd6d4;
      --ink: #1f2b32;
      --sky: #b5dceb;
      --cream: #f7f1ef;
      --card: #ffffff;
      --success: #2e9b53;
      --warning: #d0882f;
      --danger: #c23b2a;

      margin: 0;
      font-family: "Sora", "Segoe UI", "Calibri", "Arial", sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, var(--sky), var(--rose));
      border-radius: 20px;
      padding: 18px;
    }

    .jpre-page {
      max-width: 1100px;
      margin: 0 auto;
    }

    .jpre-hero {
      position: relative;
      display: grid;
      gap: 24px;
      background:
        radial-gradient(120% 140% at 0% 0%, rgba(181, 220, 235, 0.45), transparent 55%),
        radial-gradient(120% 140% at 100% 100%, rgba(239, 214, 212, 0.55), transparent 58%),
        linear-gradient(135deg, #ffffff, #fcf8f6);
      border-radius: 24px;
      padding: 20px 22px;
      box-shadow: 0 22px 50px rgba(31, 43, 50, 0.18);
    }

    .jpre-brand {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .jpre-logo {
      width: clamp(165px, 18vw, 205px);
      height: auto;
      border-radius: 20px;
      border: 3px solid transparent;
      background:
        linear-gradient(var(--card), var(--card)) padding-box,
        linear-gradient(135deg, var(--teal-dark), var(--teal), var(--sky), var(--coral), var(--rose)) border-box;
      box-shadow:
        0 14px 28px rgba(47, 85, 98, 0.24),
        0 0 0 6px rgba(181, 220, 235, 0.28);
    }

    .jpre-tag {
      margin: 0;
      font-weight: 700;
      color: var(--coral);
      letter-spacing: 2px;
    }

    .jpre-hero h1 {
      margin: 4px 0;
      font-size: clamp(1.8rem, 2vw + 1.2rem, 2.6rem);
      line-height: 1.08;
      color: var(--teal-dark);
      background: linear-gradient(110deg, var(--teal-dark), var(--teal), var(--coral));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .jpre-subtitle {
      margin: 0;
      font-size: 1rem;
      color: var(--teal-dark);
    }

    .jpre-panel {
      background: linear-gradient(150deg, rgba(247, 241, 239, 0.95), rgba(255, 255, 255, 0.95));
      padding: 8px 14px 12px;
      border-radius: 18px;
      border-left: 6px solid var(--coral);
      box-shadow: 0 10px 26px rgba(47, 85, 98, 0.1);
      font-size: 0.96rem;
      max-width: 380px;
      justify-self: end;
      line-height: 1.6;
    }

    .jpre-main { margin-top: 24px; }
    .jpre-card {
      background: var(--card);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(31, 43, 50, 0.12);
    }

    .jpre-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
    }

    .jpre-label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-weight: 600;
    }

    .jpre-input,
    .jpre-select {
      font-family: "Sora", "Segoe UI", "Calibri", "Arial", sans-serif;
      padding: 12px 14px;
      border-radius: 12px;
      border: 2px solid #ccd3d8;
      font-size: 1rem;
      background:
        radial-gradient(120% 140% at 0% 0%, rgba(181, 220, 235, 0.28), transparent 55%),
        radial-gradient(120% 140% at 100% 100%, rgba(239, 214, 212, 0.35), transparent 58%),
        linear-gradient(180deg, #ffffff, #fcf8f6);
    }

    .jpre-workshops { margin-top: 24px; }
    .jpre-workshops-grid { margin-top: 14px; display: grid; gap: 16px; }
    .jpre-franja {
      border-radius: 20px;
      padding: 18px;
      background:
        radial-gradient(130% 150% at 0% 0%, rgba(181, 220, 235, 0.32), transparent 55%),
        radial-gradient(130% 150% at 100% 100%, rgba(239, 214, 212, 0.36), transparent 60%),
        linear-gradient(155deg, #fffdfc, #f7f1ef);
      box-shadow: 0 16px 34px rgba(31, 43, 50, 0.1);
    }

    .jpre-franja-title {
      margin: 0 0 10px;
      color: var(--teal-dark);
      font-size: clamp(1.35rem, 1vw + 1rem, 1.75rem);
    }

    .jpre-taller-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .jpre-taller-card {
      border: 2px solid transparent;
      border-radius: 18px;
      padding: 15px;
      background:
        radial-gradient(120% 140% at 0% 0%, rgba(181, 220, 235, 0.25), transparent 55%),
        radial-gradient(120% 140% at 100% 100%, rgba(239, 214, 212, 0.28), transparent 58%),
        linear-gradient(165deg, #ffffff, #fcf8f6);
      box-shadow:
        0 8px 18px rgba(31, 43, 50, 0.08),
        0 1px 0 rgba(255, 255, 255, 0.85) inset;
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
    }

    .jpre-taller-card.selected {
      border-color: var(--coral);
      box-shadow: 0 14px 30px rgba(213, 107, 76, 0.25);
    }

    .jpre-taller-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .jpre-taller-name { font-weight: 700; white-space: pre-line; }

    .jpre-info-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--teal);
      background: #fff;
      color: var(--teal-dark);
      font-size: 1.08rem;
      font-weight: 800;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .jpre-availability { margin: 0; margin-top: auto; font-weight: 600; font-size: 0.95rem; }
    .jpre-availability.high { color: var(--success); }
    .jpre-availability.mid { color: var(--warning); }
    .jpre-availability.low { color: var(--danger); }

    .jpre-progress { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
    .jpre-progress-track {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: #e5edf1;
      overflow: hidden;
    }
    .jpre-progress-bar { height: 100%; }
    .jpre-progress-bar.high { background: var(--success); }
    .jpre-progress-bar.mid { background: var(--warning); }
    .jpre-progress-bar.low { background: var(--danger); }
    .jpre-progress-label { align-self: end; font-size: 0.78rem; font-weight: 700; }
    .jpre-progress-label.high { color: var(--success); }
    .jpre-progress-label.mid { color: var(--warning); }
    .jpre-progress-label.low { color: var(--danger); }

    .jpre-actions { margin-top: 18px; display: grid; gap: 8px; }
    .jpre-submit {
      justify-self: center;
      width: fit-content;
      min-width: 210px;
      border: 1px solid var(--teal-dark);
      background: var(--teal-dark);
      color: var(--cream);
      padding: 11px 18px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: "Sora", "Segoe UI", "Calibri", "Arial", sans-serif;
      letter-spacing: 0.2px;
      cursor: pointer;
    }

    .jpre-msg { min-height: 14px; margin: 0; font-weight: 600; }
  </style>

  <div class="jpre-page">
    <header class="jpre-hero">
      <div class="jpre-brand">
        <img class="jpre-logo" src="logo.png" alt="Logo de la jornada" />
        <div>
          <p class="jpre-tag">#JPRE26</p>
          <h1>XVIII Jornada de Programació i Robòtica Educatives</h1>
          <p class="jpre-subtitle">Formulari d’inscripció en línia</p>
        </div>
      </div>
      <div class="jpre-panel">
        Emplena les teves dades, escull un taller d'alguna de les franges i confirma la inscripció.
      </div>
    </header>

    <main class="jpre-main">
      <section class="jpre-card">
        <h2>Dades personals</h2>
        <form id="jpre-form" novalidate>
          <div class="jpre-grid">
            <label class="jpre-label">Nom i cognoms <input class="jpre-input" type="text" name="nom" required /></label>
            <label class="jpre-label">Centre educatiu <input class="jpre-input" type="text" name="centre" required /></label>
            <label class="jpre-label">Localitat <input class="jpre-input" type="text" name="localitat" required /></label>
            <label class="jpre-label">Correu <input class="jpre-input" type="email" name="email" placeholder="nom@correu.com" required /></label>
            <label class="jpre-label">Perfil de participació
              <select class="jpre-select" name="rol" required>
                <option value="">Selecciona el teu rol</option>
                <option value="Assistent">Assistent</option>
                <option value="Tallerista">Tallerista</option>
                <option value="Presentació d’experiències">Presentació d’experiències</option>
              </select>
            </label>
          </div>

          <div class="jpre-workshops">
            <h2>Selecció de tallers</h2>
            <p>Hi ha 2 franges disponibles i només pots escollir 1 taller en total.</p>
            <div id="jpre-workshop-container" class="jpre-workshops-grid"></div>
          </div>

          <div class="jpre-actions">
            <button class="jpre-submit" id="jpre-confirm" type="submit" disabled>Confirmar inscripció</button>
            <p class="jpre-msg" id="jpre-msg" role="status"></p>
          </div>
        </form>
      </section>
    </main>
  </div>
</div>
